<html>
<title>Epoya Game</title>
<style>
.contribution-grid {
  display: grid;
  grid-template-rows: repeat(7, 12px); /* 7 rows for 7 days */
  grid-auto-flow: column;               /* Fill columns one by one */
  grid-auto-columns: 12px;
  gap: 3px;
  margin-bottom: 20px;
  overflow-x: auto;
  padding: 10px;
  background: #f6f8fa;
  border-radius: 6px;
}

.cell {
  width: 12px;
  height: 12px;
  border-radius: 2px;
  background-color: #ebedf0; /* Default empty color */
}

/* GitHub's signature green shades */
.level-1 { background-color: #9be9a8; }
.level-2 { background-color: #40c463; }
.level-3 { background-color: #30a14e; }
.level-4 { background-color: #216e39; }

#commit-history {
  width: 100%;
  border-collapse: collapse;
  font-family: monospace;
  font-size: 0.9rem;
}

#commit-history th, #commit-history td {
  text-align: left;
  padding: 8px;
  border-bottom: 1px solid #ddd;
}
</style>

<script>
  const WORKER_URL = 'http://localhost:8787'; // Change to production URL after testing

  async function initStats() {
    try {
      const response = await fetch(WORKER_URL);
      const data = await response.json();

      renderHeatmap(data.heatmap);
      renderHistory(data.history);
    } catch (err) {
      console.error("Failed to load Epoya stats:", err);
    }
  }

  function renderHeatmap(heatmapData) {
    const grid = document.getElementById('heatmap');
    const today = new Date();
    
    // We'll render the last 90 days
    for (let i = 90; i >= 0; i--) {
      const d = new Date();
      d.setDate(today.getDate() - i);
      const dateStr = d.toISOString().split('T')[0];
      
      const count = heatmapData[dateStr] || 0;
      const cell = document.createElement('div');
      cell.classList.add('cell');
      cell.title = `${dateStr}: ${count} commits`;

      // Assign color level
      if (count > 0 && count < 3) cell.classList.add('level-1');
      else if (count >= 3 && count < 6) cell.classList.add('level-2');
      else if (count >= 6 && count < 9) cell.classList.add('level-3');
      else if (count >= 9) cell.classList.add('level-4');

      grid.appendChild(cell);
    }
  }

  function renderHistory(history) {
    const tbody = document.querySelector('#commit-history tbody');
    history.forEach(commit => {
      const row = `
        <tr>
          <td><a href="#">${commit.sha}</a></td>
          <td>${commit.date}</td>
          <td>${commit.author}</td>
          <td>${commit.msg}</td>
        </tr>`;
      tbody.innerHTML += row;
    });
  }

  initStats();
</script>

<body>
<h1>Epoya Game</h1>
<img src="splashscreen-hd.png" />
Epoya is an under-development, 2D game.

<section id="stats-container">
  <h3>Commit Activity</h3>
  <div id="heatmap" class="contribution-grid"></div>

  <h3>Recent Updates</h3>
  <table id="commit-history">
    <thead>
      <tr>
        <th>SHA</th>
        <th>Date</th>
        <th>Author</th>
        <th>Message</th>
      </tr>
    </thead>
    <tbody>
    </tbody>
  </table>
</section>

</body>
</html>
